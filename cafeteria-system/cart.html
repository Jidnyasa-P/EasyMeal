<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMeal | Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark navigation">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">EasyMeal</a>
      <div class="ms-auto d-flex gap-2"><a class="btn btn-outline-light btn-sm" href="dashboard.html">Back to Menu</a></div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <h2 class="fw-bold mb-4">Your Cart</h2>
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle" id="cartTable">
              <thead><tr><th>Item</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th>Action</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
          <div class="text-end">
            <h4>Total: ₹<span id="cartTotal">0</span></h4>
          </div>
          <div class="d-flex flex-wrap gap-2 justify-content-end mt-3">
            <button class="btn btn-outline-success" id="updateCartBtn">Update Cart</button>
            <button class="btn btn-success" id="placeOrderBtn">Place Order</button>
          </div>
          <div class="alert mt-3 d-none" id="cartAlert"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0">
        <div class="modal-body text-center p-5">
          <div class="spinner-border text-success mb-3" role="status"></div>
          <h5 class="mb-0">Placing your order...</h5>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
