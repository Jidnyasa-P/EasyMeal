<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMeal | Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">EasyMeal</a>
      <a class="btn btn-outline-light btn-sm ms-auto" href="cart.html">Back to Cart</a>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <h2 class="fw-bold mb-4">Choose Payment Method</h2>
      <div class="row g-4">
        <div class="col-md-6">
          <div class="payment-card p-4 rounded-4 h-100" data-method="online">
            <i class="bi bi-credit-card-2-front fs-1"></i>
            <h5 class="mt-3">Online Payment</h5>
            <p class="text-muted mb-0">Pay instantly using UPI / Card / Net Banking.</p>
          </div>
        </div>
        <div class="col-md-6">
          <div class="payment-card p-4 rounded-4 h-100" data-method="cod">
            <i class="bi bi-cash-stack fs-1"></i>
            <h5 class="mt-3">Cash on Delivery</h5>
            <p class="text-muted mb-0">Pay at counter while collecting your order.</p>
          </div>
        </div>
      </div>
      <div class="text-end mt-4">
        <button class="btn btn-success" id="continuePayment" disabled>Continue</button>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
