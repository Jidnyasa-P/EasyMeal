<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMeal | Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark navigation">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-cup-hot-fill me-2"></i>EasyMeal Admin</a>
      <a href="login.html" id="logoutBtn" class="btn btn-outline-light btn-sm ms-auto">Logout</a>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <h2 class="fw-bold mb-4">Cafeteria Admin Dashboard</h2>

      <!-- Stats -->
      <section class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="statistics bg-white p-3 rounded-4 shadow-sm">
            <h6>Total Orders</h6>
            <h3 class="mb-0" id="statTotal"><span class="spinner-border spinner-border-sm"></span></h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="statistics bg-white p-3 rounded-4 shadow-sm">
            <h6>Pending Orders</h6>
            <h3 class="mb-0 text-warning" id="statPending">-</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="statistics bg-white p-3 rounded-4 shadow-sm">
            <h6>Completed Orders</h6>
            <h3 class="mb-0 text-success" id="statCompleted">-</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="statistics bg-white p-3 rounded-4 shadow-sm">
            <h6>Total Revenue</h6>
            <h3 class="mb-0 text-primary" id="statRevenue">-</h3>
          </div>
        </div>
      </section>

      <!-- Menu Management -->
      <section class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
          <h5 class="mb-0">Menu Management</h5>
          <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#menuModal">
            <i class="bi bi-plus-circle me-1"></i>Add Item
          </button>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr><th>Item</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody id="adminMenuTableBody">
                <tr><td colspan="5" class="text-center py-3">
                  <div class="spinner-border spinner-border-sm text-success"></div> Loading menu...
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Order Management -->
      <section class="card border-0 shadow-sm">
        <div class="card-header bg-white">
          <div class="row g-2 align-items-center">
            <div class="col-md-4"><h5 class="mb-0">Order Management</h5></div>
            <div class="col-md-4">
              <input type="text" id="adminOrderSearch" class="form-control" placeholder="Search order ID or student">
            </div>
            <div class="col-md-4">
              <select id="adminOrderFilter" class="form-select">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="preparing">Preparing</option>
                <option value="ready">Ready</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped" id="adminOrdersTable">
              <thead>
                <tr><th>Order ID</th><th>Student</th><th>Items</th><th>Status</th><th>Update Status</th></tr>
              </thead>
              <tbody>
                <tr><td colspan="5" class="text-center py-3">
                  <div class="spinner-border spinner-border-sm text-success"></div> Loading orders...
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Add Menu Item Modal -->
  <div class="modal fade" id="menuModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Menu Item</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Item Name <span class="text-danger">*</span></label>
            <input class="form-control" type="text" id="newItemName" placeholder="e.g. Veg Biryani">
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" id="newItemCategory">
              <option value="meal">Meal</option>
              <option value="snack">Snack</option>
              <option value="drink">Drink</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Price (₹) <span class="text-danger">*</span></label>
            <input class="form-control" type="number" id="newItemPrice" placeholder="e.g. 85" min="1">
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="newItemDesc" rows="2" placeholder="Short description of the item"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-success" id="saveMenuItemBtn">
            <i class="bi bi-save me-1"></i>Save Item
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
