<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMeal | Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .panel-btn { min-width: 180px; font-weight: 600; font-size: 1rem; border-radius: 12px; transition: all .2s; padding: .6rem 1.4rem; }
    .status-col { border-radius: 14px; overflow: hidden; }
    .status-col .col-header {
      padding: .85rem 1.2rem;
      font-weight: 700;
      font-size: .95rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pending-col { border: 2px solid #ffc107; background: #fffbea; }
    .ready-col   { border: 2px solid #28a745; background: #eafaf1; }
    .pending-col .col-header { background: #fff8d6; }
    .ready-col   .col-header { background: #d4edda; }
    .orders-list { padding: .75rem; min-height: 180px; }
    .order-item {
      background: #fff;
      border-radius: 10px;
      padding: .7rem 1rem;
      margin-bottom: .6rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .order-item .order-info strong { font-size: .9rem; }
    .order-item .order-meta { font-size: .8rem; color: #6b7280; margin-top: 2px; }
    .mark-ready-btn, .mark-done-btn { font-size: .78rem; padding: .28rem .85rem; white-space: nowrap; border-radius: 8px; font-weight: 600; }
    .no-orders-msg   { text-align: center; color: #9ca3af; padding: 2.5rem 0; font-size: .9rem; }
    .section-panel   { display: none; }
    .section-panel.active { display: block; }
    .live-dot {
      width: 9px; height: 9px; border-radius: 50%;
      display: inline-block; margin-right: 6px;
      animation: blink 1.4s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark navigation">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-cup-hot-fill me-2"></i>EasyMeal Admin</a>
      <span class="text-white-50 ms-auto me-3 d-none d-md-inline" style="font-size:.85rem">
        <i class="bi bi-calendar3 me-1"></i><span id="adminTodayDate"></span>
      </span>
      <a href="login.html" id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <h2 class="fw-bold mb-4">Cafeteria Admin Dashboard</h2>

      <!-- Stats -->
      <section class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="statistics bg-white p-3 rounded-4 shadow-sm">
            <h6 class="text-muted mb-1">Total Orders</h6>
            <h3 class="mb-0" id="statTotal"><span class="spinner-border spinner-border-sm"></span></h3>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="statistics bg-white p-3 rounded-4 shadow-sm">
            <h6 class="text-muted mb-1">Pending</h6>
            <h3 class="mb-0 text-warning" id="statPending">-</h3>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="statistics bg-white p-3 rounded-4 shadow-sm">
            <h6 class="text-muted mb-1">Ready</h6>
            <h3 class="mb-0 text-success" id="statReady">-</h3>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="statistics bg-white p-3 rounded-4 shadow-sm">
            <h6 class="text-muted mb-1">Total Revenue</h6>
            <h3 class="mb-0 text-primary" id="statRevenue">-</h3>
          </div>
        </div>
      </section>

      <!-- Panel Toggle Buttons -->
      <div class="d-flex gap-3 mb-4 flex-wrap">
        <button id="btnOrderMgmt" class="btn btn-warning panel-btn" onclick="showPanel('orders')">
          <i class="bi bi-receipt-cutoff me-2"></i>Order Management
        </button>
        <button id="btnMenuMgmt" class="btn btn-outline-success panel-btn" onclick="showPanel('menu')">
          <i class="bi bi-menu-button-wide me-2"></i>Menu Management
        </button>
      </div>

      <!-- ====== ORDER MANAGEMENT PANEL ====== -->
      <section id="panelOrders" class="section-panel">
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
          <h5 class="fw-bold mb-0">
            <span class="live-dot bg-success"></span>Live Orders
            <small class="text-muted fw-normal fs-6 ms-2" id="lastRefreshedTime"></small>
          </h5>
          <div class="d-flex gap-2 align-items-center flex-wrap">
            <input type="text" id="adminOrderSearch" class="form-control form-control-sm" placeholder="Search order / student" style="max-width:210px">
            <button class="btn btn-sm btn-outline-secondary" id="refreshOrdersBtn" title="Refresh orders">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
        </div>

        <!-- Two-column status board -->
        <div class="row g-3">
          <!-- Pending Column -->
          <div class="col-md-6">
            <div class="status-col pending-col">
              <div class="col-header">
                <span><i class="bi bi-hourglass-split me-2 text-warning"></i>Pending</span>
                <span class="badge text-bg-warning fs-6 px-3" id="pendingCount">0</span>
              </div>
              <div class="orders-list" id="pendingOrders">
                <div class="no-orders-msg"><i class="bi bi-check2-all d-block fs-2 mb-1"></i>No pending orders</div>
              </div>
            </div>
          </div>

          <!-- Ready Column -->
          <div class="col-md-6">
            <div class="status-col ready-col">
              <div class="col-header">
                <span><i class="bi bi-bag-check-fill me-2 text-success"></i>Ready for Pickup</span>
                <span class="badge text-bg-success fs-6 px-3" id="readyCount">0</span>
              </div>
              <div class="orders-list" id="readyOrders">
                <div class="no-orders-msg"><i class="bi bi-box-seam d-block fs-2 mb-1"></i>No ready orders</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ====== MENU MANAGEMENT PANEL ====== -->
      <section id="panelMenu" class="section-panel">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h5 class="mb-0">Menu Management</h5>
            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#menuModal">
              <i class="bi bi-plus-circle me-1"></i>Add Item
            </button>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead>
                  <tr><th>Item</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="adminMenuTableBody">
                  <tr><td colspan="5" class="text-center py-3">
                    <div class="spinner-border spinner-border-sm text-success"></div> Loading menu...
                  </td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Add Menu Item Modal -->
  <div class="modal fade" id="menuModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Menu Item</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Item Name <span class="text-danger">*</span></label>
            <input class="form-control" type="text" id="newItemName" placeholder="e.g. Veg Biryani">
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" id="newItemCategory">
              <option value="meal">Meal</option>
              <option value="snack">Snack</option>
              <option value="drink">Drink</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Price (₹) <span class="text-danger">*</span></label>
            <input class="form-control" type="number" id="newItemPrice" placeholder="e.g. 85" min="1">
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="newItemDesc" rows="2" placeholder="Short description of the item"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-success" id="saveMenuItemBtn">
            <i class="bi bi-save me-1"></i>Save Item
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Menu Item Modal -->
  <div class="modal fade" id="editMenuModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Menu Item</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editItemId">
          <div class="mb-3">
            <label class="form-label">Item Name <span class="text-danger">*</span></label>
            <input class="form-control" type="text" id="editItemName" placeholder="e.g. Veg Biryani">
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" id="editItemCategory">
              <option value="meal">Meal</option>
              <option value="snack">Snack</option>
              <option value="drink">Drink</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Price (₹) <span class="text-danger">*</span></label>
            <input class="form-control" type="number" id="editItemPrice" placeholder="e.g. 85" min="1">
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="editItemDesc" rows="2" placeholder="Short description"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-warning" id="saveEditItemBtn">
            <i class="bi bi-save me-1"></i>Save Changes
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/script.js"></script>
  <script>
    // Show today's date in navbar
    (function() {
      const d = new Date();
      const opts = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
      document.getElementById('adminTodayDate').textContent = d.toLocaleDateString('en-IN', opts);
    })();

    function showPanel(which) {
      if (which === 'orders') {
        $('#panelOrders').addClass('active');
        $('#panelMenu').removeClass('active');
        $('#btnOrderMgmt').removeClass('btn-outline-warning').addClass('btn-warning');
        $('#btnMenuMgmt').removeClass('btn-success').addClass('btn-outline-success');
      } else {
        $('#panelMenu').addClass('active');
        $('#panelOrders').removeClass('active');
        $('#btnMenuMgmt').removeClass('btn-outline-success').addClass('btn-success');
        $('#btnOrderMgmt').removeClass('btn-warning').addClass('btn-outline-warning');
        if (typeof window.loadAdminMenu === 'function') window.loadAdminMenu();
      }
    }
  </script>
</body>
</html>
