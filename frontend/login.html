<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMeal | Login & Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-bg d-flex align-items-center min-vh-100">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="card-header bg-success text-white p-4">
            <h3 class="mb-1"><i class="bi bi-person-circle me-2"></i>Account Access</h3>
            <p class="mb-0 small">Student and Admin login portal</p>
          </div>
          <div class="card-body p-4">
            <ul class="nav nav-pills mb-4" id="authTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#student-login">Student Login</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#admin-login">Admin Login</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#register">Register</button>
              </li>
            </ul>

            <div class="tab-content">
              <!-- Student Login -->
              <div class="tab-pane fade show active" id="student-login">
                <form id="studentLoginForm">
                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" placeholder="aditi@student.com" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="student123" required>
                  </div>
                  <button type="submit" class="btn btn-success w-100">Login as Student</button>
                  <p class="text-muted small mt-2">Demo: aditi@student.com / student123</p>
                </form>
              </div>

              <!-- Admin Login -->
              <div class="tab-pane fade" id="admin-login">
                <form id="adminLoginForm">
                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" placeholder="admin@easymeal.com" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="admin123" required>
                  </div>
                  <button type="submit" class="btn btn-dark w-100">Login as Admin</button>
                  <p class="text-muted small mt-2">Demo: admin@easymeal.com / admin123</p>
                </form>
              </div>

              <!-- Register -->
              <div class="tab-pane fade" id="register">
                <form id="registerForm">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Name</label>
                      <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Phone</label>
                      <input type="tel" class="form-control" name="phone">
                    </div>
                    <div class="col-12">
                      <label class="form-label">Email</label>
                      <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="col-12">
                      <label class="form-label">Password</label>
                      <input type="password" class="form-control" name="password" minlength="6" required>
                    </div>
                  </div>
                  <button type="submit" class="btn btn-warning w-100 mt-3">Create Account</button>
                </form>
              </div>
            </div>

            <div id="formAlert" class="alert mt-3 d-none"></div>
            <a href="index.html" class="btn btn-link mt-2">← Back to Home</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
