<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMeal | Order Confirmation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .status-step {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; position: relative; font-size: .82rem; font-weight: 600; color: #9ca3af;
    }
    .status-step.done { color: #16a34a; }
    .status-step.active { color: #d97706; }
    .status-step .step-dot {
      width: 36px; height: 36px; border-radius: 50%;
      background: #e5e7eb; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; margin-bottom: 6px; border: 3px solid #e5e7eb;
      transition: all .4s ease;
    }
    .status-step.done .step-dot  { background: #dcfce7; border-color: #16a34a; color: #16a34a; }
    .status-step.active .step-dot { background: #fef9c3; border-color: #d97706; color: #d97706; animation: pulse-dot 1.4s infinite; }
    .step-line { flex: 1; height: 3px; background: #e5e7eb; align-self: center; margin-bottom: 22px; transition: background .4s; }
    .step-line.done { background: #16a34a; }
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 0 0 rgba(217,119,6,.4); }
      50%      { box-shadow: 0 0 0 8px rgba(217,119,6,0); }
    }
    .live-badge { font-size: .75rem; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark navigation">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-cup-hot-fill me-2"></i>EasyMeal</a>
      <a class="btn btn-outline-light btn-sm ms-auto" href="dashboard.html">Back to Dashboard</a>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="card border-0 shadow-lg rounded-4 p-4 confirmation-card mx-auto">
        <div class="text-center mb-4">
          <i class="bi bi-check-circle-fill text-success display-4"></i>
          <h2 class="fw-bold mt-2">Order Confirmed!</h2>
          <p class="text-muted mb-0">Your order has been placed. Watch the status update live below.</p>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <div class="info-chip">Order ID: <strong id="confirmOrderId">#--</strong></div>
          </div>
          <div class="col-md-4">
            <div class="info-chip">Estimated Time: <strong>20 mins</strong></div>
          </div>
          <div class="col-md-4">
            <div class="info-chip">Amount: <strong id="confirmTotal">₹--</strong></div>
          </div>
        </div>

        <!-- Live status tracker -->
        <div class="d-flex justify-content-between mb-1 align-items-center">
          <h6 class="fw-bold mb-0">Live Order Status</h6>
          <span class="badge text-bg-success live-badge"><i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>Live</span>
        </div>

        <div class="d-flex align-items-center my-3">
          <div class="status-step" id="step-pending">
            <div class="step-dot"><i class="bi bi-hourglass-split"></i></div>
            <span>Pending</span>
          </div>
          <div class="step-line" id="line-1"></div>
          <div class="status-step" id="step-ready">
            <div class="step-dot"><i class="bi bi-bag-check"></i></div>
            <span>Ready for Pickup</span>
          </div>
        </div>

        <div id="statusMessage" class="alert alert-warning py-2 text-center mb-3" role="alert">
          <i class="bi bi-hourglass-split me-1"></i> Your order is being prepared...
        </div>

        <div class="mt-3 d-flex flex-wrap gap-2">
          <a href="dashboard.html" class="btn btn-outline-success">Order More</a>
          <a href="index.html" class="btn btn-success">Go to Home</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
