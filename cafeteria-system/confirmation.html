<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMeal | Order Confirmation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">EasyMeal</a>
      <a class="btn btn-outline-light btn-sm ms-auto" href="dashboard.html">Back to Dashboard</a>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="card border-0 shadow-lg rounded-4 p-4 confirmation-card mx-auto">
        <div class="text-center mb-4">
          <i class="bi bi-check-circle-fill text-success display-4"></i>
          <h2 class="fw-bold mt-2">Order Confirmed!</h2>
          <p class="text-muted mb-0">Your meal is now in preparation.</p>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4"><div class="info-chip">Order ID: <strong>#EM1251</strong></div></div>
          <div class="col-md-4"><div class="info-chip">Estimated Time: <strong>20 mins</strong></div></div>
          <div class="col-md-4"><div class="info-chip">Counter: <strong>A2</strong></div></div>
        </div>

        <h6 class="fw-bold">Order Status</h6>
        <div class="progress mb-3" style="height: 26px;">
          <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" id="statusProgress" style="width: 35%">Preparing</div>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <span class="badge text-bg-warning status-badge active">Preparing</span>
          <span class="badge text-bg-info status-badge">Ready</span>
          <span class="badge text-bg-secondary status-badge">Completed</span>
        </div>

        <div class="mt-4 d-flex flex-wrap gap-2">
          <a href="dashboard.html" class="btn btn-outline-success">Order More</a>
          <a href="index.html" class="btn btn-success">Go to Home</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
